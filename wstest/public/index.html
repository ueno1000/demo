<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet">
  <title>WebSocket Messaging Test</title>
</head>
<body>
<main class="py-8 px-12 w-96 mx-auto bg-gray-100">
  <section class="my-4">
    <div>
      <span class="text-sm font-bold">WS Status</span>
      <div class="bg-indigo-200 p-2 mb-2">
        <span class="websocket-status">null</span>
      </div>
    </div>
  </section>
  <section class="my-4">
    <div class="bg-gray-300 p-2 rounded shadow">
      <div>
        <input
            class="appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline mb-2"
            id="send-message"
            type="text"
            placeholder="Enter a message"
        >
      </div>
      <div class="text-right">
        <button id="send-button" class="py-2 px-4 rounded bg-indigo-600 text-white">
          Send Message
        </button>
      </div>
    </div>
  </section>
  <section class="my-4">
    <div class="text-sm font-bold">Message List</div>
    <div id="messages">
    </div>
  </section>
</main>
<script>

const URL = 'ws://localhost:3000/'
const PROTOCOL = 'wstest'

const socket = new WebSocket(URL, PROTOCOL)

// ------------------------------
// WebSocket events
// ------------------------------

// Fired when the WebSocket connection opens
// Equivalent to: socket.onopen = () => {}
socket.addEventListener('open', (event) => {
  setWsStatus('WebSocket connection opened')
})

// Fired when a message is received from the WebSocket server
// Equivalent to: socket.onmessage = () => {}
socket.addEventListener('message', ({ data }) => {
  setWsStatus('message: ' + data)
  appendMessage(data)
})

// Fired when an error occurs on the WebSocket connection
// Equivalent to: socket.onerror = () => {}
socket.addEventListener('error', (event) => {
  setWsStatus('WebSocket connection error')
  console.log('error')
})

// Fired when the WebSocket connection closes
// Equivalent to: socket.onclose = () => {}
socket.addEventListener('close', (event) => {
  setWsStatus('WebSocket connection closed')
  console.log('close')
})

// ------------------------------
// WebSocket methods
// ------------------------------
const sendMessage = (message) => {
  socket.send(message)
}

// ------------------------------
// DOM operations
// ------------------------------

const sendMessageEl = document.querySelector('#send-message')
const sendButtonEl = document.querySelector('#send-button')
sendButtonEl.addEventListener('click', () => {
  const message = sendMessageEl.value
  sendMessage(message)
  sendMessageEl.value = ''
})

const setWsStatus = (text) => {
  const statusEl = document.querySelector('.websocket-status')
  statusEl.innerHTML = text
}

const createMessageEl = (text) => {
  return `<div class="rounded bg-white p-2 mb-2 text text-gray-600">${text}</div>`
}
const appendMessage = (text) => {
  const el = createMessageEl(text)
  document.querySelector('#messages').insertAdjacentHTML('afterend', el)
}

</script>
</body>
</html>
